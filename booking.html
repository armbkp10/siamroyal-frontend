<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siam Royal Journey — Premium Private Tours Thailand</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8dcc8;font-family:'DM Sans',sans-serif;overflow-x:hidden}
:root{--gold:#c9a96e;--gold-light:#e8d5a3;--gold-dark:#8a6b3a;--dark:#0a0a0a;--dark2:#111111;--dark3:#1a1a1a;--cream:#e8dcc8;--muted:#b8a990;--green:#4caf7d;--red:#e05c5c}
nav{background:rgba(10,10,10,0.98);border-bottom:1px solid rgba(201,169,110,0.2);padding:0 4%;display:flex;justify-content:space-between;align-items:center;height:68px;position:sticky;top:0;z-index:100}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold);letter-spacing:2px;cursor:pointer}
.logo span{color:var(--cream);font-weight:400;font-style:italic}
.nav-center{display:flex;gap:20px;list-style:none}
.nav-center a{color:var(--muted);font-size:12px;letter-spacing:1px;cursor:pointer;transition:color 0.2s}
.nav-center a:hover{color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:10px}
.lang-sw{display:flex;border:1px solid rgba(201,169,110,0.3)}
.lb{background:transparent;border:none;color:var(--muted);padding:7px 10px;font-size:11px;cursor:pointer;font-family:inherit;border-right:1px solid rgba(201,169,110,0.2);transition:all 0.2s}
.lb:last-child{border-right:none}
.lb.active{background:var(--gold);color:#0a0a0a;font-weight:500}
.lb:not(.active):hover{color:var(--gold)}
.nav-transfer{background:transparent;border:1px solid rgba(201,169,110,0.35);color:var(--gold);padding:8px 14px;font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.3s;letter-spacing:0.5px}
.nav-transfer:hover{background:rgba(201,169,110,0.08)}
.nav-book{background:var(--gold);border:none;color:#0a0a0a;padding:9px 18px;font-size:11px;letter-spacing:1.5px;cursor:pointer;font-weight:500;font-family:inherit;transition:all 0.3s}
.nav-book:hover{background:var(--gold-light)}
.page{display:none}.page.active{display:block}
/* HERO */
.hero{padding:72px 4% 52px;text-align:center;background:#0a0a0a;position:relative;overflow:hidden}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,169,110,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,169,110,0.03) 1px,transparent 1px);background-size:56px 56px}
.hero-ring{position:absolute;border:1px solid rgba(201,169,110,0.05);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.hc{position:relative;z-index:2}
.badge-strip{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(201,169,110,0.35);padding:7px 20px;font-size:10px;letter-spacing:3px;color:var(--gold);margin-bottom:24px}
.badge-strip::before,.badge-strip::after{content:'';display:inline-block;width:14px;height:1px;background:var(--gold)}
h1.ht{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,5.5vw,74px);font-weight:400;line-height:1.08;color:var(--cream);margin-bottom:12px}
h1.ht em{color:var(--gold);font-style:italic}
.hsub{font-size:14px;color:var(--muted);margin-bottom:36px;max-width:460px;margin-left:auto;margin-right:auto;line-height:1.7}
.hbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:48px}
.bp{background:var(--gold);color:#0a0a0a;border:none;padding:13px 28px;font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:500;font-family:inherit;transition:all 0.3s}
.bp:hover{background:var(--gold-light)}
.bo{background:transparent;border:1px solid rgba(201,169,110,0.45);color:var(--gold);padding:13px 28px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:inherit;transition:all 0.3s}
.bo:hover{border-color:var(--gold)}
.stats{display:flex;justify-content:center;border-top:1px solid rgba(201,169,110,0.12);padding-top:36px}
.stat{padding:0 36px;text-align:center;border-right:1px solid rgba(201,169,110,0.12)}
.stat:last-child{border-right:none}
.sn{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--gold);font-weight:600}
.sl{font-size:10px;color:var(--muted);letter-spacing:1.5px;margin-top:3px}
/* SEARCH BAR */
.sbar-wrap{background:var(--dark2);padding:0 4%}
.sbar{background:var(--dark3);border:1px solid rgba(201,169,110,0.18);padding:7px 7px 7px 18px;display:flex;align-items:center;gap:8px;max-width:780px;margin:0 auto;transform:translateY(-24px)}
.sf{flex:1;background:none;border:none;outline:none;color:var(--cream);font-size:12px;font-family:inherit;min-width:0}
.sf::placeholder{color:var(--muted)}
select.sf{cursor:pointer}
.ssep{width:1px;height:26px;background:rgba(201,169,110,0.18);flex-shrink:0}
.sbtn{background:var(--gold);border:none;color:#0a0a0a;padding:11px 20px;font-size:10px;letter-spacing:2px;cursor:pointer;font-weight:500;font-family:inherit;flex-shrink:0}
/* SECTIONS */
.sec{padding:72px 4%}
.sh{text-align:center;margin-bottom:48px}
.ey{font-size:10px;letter-spacing:4px;color:var(--gold);margin-bottom:10px}
.st{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,3.5vw,44px);font-weight:400;color:var(--cream);line-height:1.2}
.st em{color:var(--gold);font-style:italic}
.dv{width:44px;height:1px;background:var(--gold);margin:16px auto 0}
/* PACKAGE GRID */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.pc{background:var(--dark3);cursor:pointer;transition:transform 0.25s;overflow:hidden}
.pc:hover{transform:translateY(-3px)}
.pi{height:200px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pi img{width:100%;height:100%;object-fit:cover;opacity:0.85;position:absolute;inset:0}
.pb{position:absolute;top:14px;left:14px;background:var(--gold);color:#0a0a0a;padding:4px 10px;font-size:9px;letter-spacing:2px;font-weight:500;z-index:2}
.pbody{padding:20px}
.pdest{font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:5px}
.pname{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);margin-bottom:8px;line-height:1.3}
.pdesc{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.pmeta{display:flex;gap:12px;margin-bottom:14px}
.pm{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.dot{width:5px;height:5px;background:var(--gold-dark);border-radius:50%;flex-shrink:0}
.pfoot{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid rgba(201,169,110,0.12)}
.pp{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold)}
.pp span{font-size:10px;color:var(--muted);font-family:'DM Sans',sans-serif}
.pbtn{background:transparent;border:1px solid rgba(201,169,110,0.3);color:var(--gold);padding:8px 14px;font-size:10px;letter-spacing:1.5px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.pbtn:hover{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}
.ccard{background:linear-gradient(135deg,var(--dark3),#1a1208);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:36px 24px}
.ci{width:46px;height:46px;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.ct{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--cream);margin-bottom:8px}
.cd{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:20px}
/* STEPS */
.steps-g{display:grid;grid-template-columns:repeat(4,1fr);position:relative}
.steps-g::before{content:'';position:absolute;top:26px;left:12.5%;right:12.5%;height:1px;background:linear-gradient(90deg,transparent,rgba(201,169,110,0.25),transparent)}
.step{text-align:center;padding:36px 20px}
.snum{width:52px;height:52px;border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);background:var(--dark2);position:relative;z-index:1}
.stit{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--cream);margin-bottom:8px}
.sdesc{font-size:11px;color:var(--muted);line-height:1.7}
/* REVIEWS */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.tc{background:var(--dark3);border:1px solid rgba(201,169,110,0.1);padding:24px}
.tstar{color:var(--gold);font-size:12px;letter-spacing:2px;margin-bottom:12px}
.tq{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--cream);line-height:1.6;font-style:italic;margin-bottom:18px}
.tau{display:flex;align-items:center;gap:8px}
.tav{width:34px;height:34px;border-radius:50%;background:var(--gold-dark);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gold-light);font-weight:500;flex-shrink:0}
.tn{font-size:12px;color:var(--cream);font-weight:500}
.tt{font-size:10px;color:var(--muted);margin-top:2px}
/* CTA */
.cta-s{background:var(--dark3);border-top:1px solid rgba(201,169,110,0.12);border-bottom:1px solid rgba(201,169,110,0.12);text-align:center;padding:72px 4%}
.cta-deco{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px}
.cta-deco::before,.cta-deco::after{content:'';flex:1;max-width:60px;height:1px;background:var(--gold-dark)}
.cta-ic{width:32px;height:32px;border:1px solid var(--gold-dark);display:flex;align-items:center;justify-content:center}
.cta-t{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,3.5vw,42px);color:var(--cream);margin-bottom:12px}
.cta-s2{font-size:13px;color:var(--muted);margin-bottom:32px;max-width:420px;margin-left:auto;margin-right:auto;line-height:1.7}
/* CONTACT */
.contact-float{display:flex;gap:8px;justify-content:center;padding:20px 4% 0;flex-wrap:wrap}
.cf-btn{display:flex;align-items:center;gap:8px;padding:12px 20px;border:1px solid rgba(201,169,110,0.25);cursor:pointer;font-size:12px;font-family:inherit;transition:all 0.25s;letter-spacing:0.5px;background:var(--dark3)}
.cf-btn.line{color:#06c755;border-color:rgba(6,199,85,0.3)}.cf-btn.line:hover{background:rgba(6,199,85,0.08)}
.cf-btn.wechat{color:#07c160;border-color:rgba(7,193,96,0.3)}.cf-btn.wechat:hover{background:rgba(7,193,96,0.08)}
.cf-btn.wa{color:#25d366;border-color:rgba(37,211,102,0.3)}.cf-btn.wa:hover{background:rgba(37,211,102,0.08)}
.cf-btn.tel{color:var(--gold);border-color:rgba(201,169,110,0.3)}.cf-btn.tel:hover{background:rgba(201,169,110,0.06)}
/* FOOTER */
.foot{background:var(--dark);border-top:1px solid rgba(201,169,110,0.08);padding:48px 4% 24px}
.fg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;margin-bottom:36px}
.fd{font-size:11px;color:var(--muted);line-height:1.7;margin-top:10px}
.fch4{font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:14px}
.flinks{list-style:none;display:flex;flex-direction:column;gap:7px}
.flinks a{font-size:11px;color:var(--muted);cursor:pointer;transition:color 0.2s}
.flinks a:hover{color:var(--gold)}
.fb{border-top:1px solid rgba(201,169,110,0.08);padding-top:18px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.fc{font-size:10px;color:var(--muted)}
/* TRANSFER BANNER */
.tf-banner{background:linear-gradient(90deg,#0a0a0a,#1a1208,#0a0a0a);border-top:1px solid rgba(201,169,110,0.15);border-bottom:1px solid rgba(201,169,110,0.15);padding:24px 4%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
.tf-banner-icon{width:48px;height:48px;border:1px solid rgba(201,169,110,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tf-banner-t{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--cream)}
.tf-banner-s{font-size:11px;color:var(--muted);margin-top:3px}
/* BOOKING */
.bk-page{background:var(--dark2);padding:48px 4%}
.bk-header{text-align:center;margin-bottom:40px}
.bk-steps{display:flex;justify-content:center;margin-bottom:40px;flex-wrap:wrap;gap:0}
.bk-step{display:flex;align-items:center;gap:8px;padding:0 16px}
.bk-step-num{width:28px;height:28px;border:1px solid rgba(201,169,110,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);transition:all 0.3s}
.bk-step-num.active{background:var(--gold);border-color:var(--gold);color:#0a0a0a;font-weight:500}
.bk-step-num.done{background:var(--gold-dark);border-color:var(--gold-dark);color:var(--gold-light)}
.bk-step-label{font-size:11px;color:var(--muted);letter-spacing:1px}
.bk-step-label.active{color:var(--gold)}
.bk-line{width:32px;height:1px;background:rgba(201,169,110,0.2)}
.bk-form{max-width:680px;margin:0 auto;background:var(--dark3);border:1px solid rgba(201,169,110,0.15);padding:36px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.full{grid-template-columns:1fr}
.fgroup{display:flex;flex-direction:column;gap:6px}
.flabel{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.finput{background:var(--dark2);border:1px solid rgba(201,169,110,0.2);color:var(--cream);padding:12px 14px;font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;width:100%}
.finput:focus{border-color:var(--gold)}
.finput::placeholder{color:var(--muted)}
select.finput{cursor:pointer}
.pkg-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.pkg-opt{border:1px solid rgba(201,169,110,0.2);padding:16px;cursor:pointer;transition:all 0.25s;background:var(--dark2)}
.pkg-opt:hover{border-color:rgba(201,169,110,0.5)}
.pkg-opt.selected{border-color:var(--gold);background:rgba(201,169,110,0.05)}
.pkg-opt-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--cream);margin-bottom:4px}
.pkg-opt-price{font-size:13px;color:var(--gold)}
.pkg-opt-dur{font-size:10px;color:var(--muted);margin-top:3px}
.form-nav{display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid rgba(201,169,110,0.12)}
.fbk{background:var(--gold);border:none;color:#0a0a0a;padding:13px 28px;font-size:11px;letter-spacing:2px;cursor:pointer;font-weight:500;font-family:inherit;transition:all 0.3s}
.fbk:hover{background:var(--gold-light)}
.fbk:disabled{opacity:0.6;cursor:not-allowed}
.fbk-out{background:transparent;border:1px solid rgba(201,169,110,0.3);color:var(--muted);padding:13px 28px;font-size:11px;letter-spacing:2px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.fbk-out:hover{color:var(--gold);border-color:var(--gold)}
.bk-summary{background:var(--dark2);border:1px solid rgba(201,169,110,0.15);padding:20px;margin-bottom:20px}
.bk-sum-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(201,169,110,0.08);font-size:12px}
.bk-sum-row:last-child{border-bottom:none;padding-top:12px;margin-top:4px}
.bk-sum-label{color:var(--muted)}.bk-sum-val{color:var(--cream)}
/* SUCCESS + CONTACT */
.success-box{text-align:center;padding:40px 24px}
.success-icon{width:64px;height:64px;border:2px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.success-t{font-family:'Cormorant Garamond',serif;font-size:28px;color:var(--cream);margin-bottom:10px}
.success-s{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:24px;max-width:420px;margin-left:auto;margin-right:auto}
.booking-ref{background:var(--dark2);border:1px solid rgba(201,169,110,0.2);padding:14px 24px;display:inline-block;margin-bottom:24px}
.ref-label{font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:4px}
.ref-num{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream)}
/* PAYMENT CONTACT CHANNELS */
.pay-contact-grid">.pay-contact-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:20px 0}
.pay-ch{border:1px solid rgba(201,169,110,0.2);padding:16px;text-align:center;cursor:pointer;transition:all 0.25s;background:var(--dark2)}
.pay-ch:hover{border-color:var(--gold);background:rgba(201,169,110,0.04)}
.pay-ch-icon{font-size:24px;margin-bottom:8px}
.pay-ch-label{font-size:11px;color:var(--cream);font-weight:500;margin-bottom:3px}
.pay-ch-id{font-size:10px;color:var(--gold)}
/* TRANSFER */
.tf-page{background:var(--dark2);padding:48px 4%}
.tf-hero{background:linear-gradient(135deg,#0a0a0a,#1a1208);border:1px solid rgba(201,169,110,0.15);padding:40px;margin-bottom:32px;text-align:center;max-width:720px;margin-left:auto;margin-right:auto}
.tf-types{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.tf-type{background:var(--dark3);border:2px solid rgba(201,169,110,0.15);padding:20px;text-align:center;cursor:pointer;transition:all 0.25s}
.tf-type:hover,.tf-type.sel{border-color:var(--gold);background:rgba(201,169,110,0.05)}
.tf-type-icon{font-size:28px;margin-bottom:8px}
.tf-type-name{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--cream);margin-bottom:4px}
.tf-type-desc{font-size:10px;color:var(--muted);line-height:1.5}
.tf-type-price{font-size:15px;color:var(--gold);margin-top:8px;font-weight:500}
.tf-form{max-width:720px;margin:0 auto;background:var(--dark3);border:1px solid rgba(201,169,110,0.15);padding:36px}
.dir-toggle{display:flex;margin-bottom:24px;border:1px solid rgba(201,169,110,0.2)}
.dir-btn{flex:1;background:transparent;border:none;color:var(--muted);padding:12px;font-size:11px;letter-spacing:1px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.dir-btn.active{background:var(--gold);color:#0a0a0a;font-weight:500}
.airport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.airport-opt{border:1px solid rgba(201,169,110,0.2);padding:12px 14px;cursor:pointer;transition:all 0.25s;background:var(--dark2)}
.airport-opt:hover{border-color:rgba(201,169,110,0.5)}
.airport-opt.sel{border-color:var(--gold);background:rgba(201,169,110,0.05)}
