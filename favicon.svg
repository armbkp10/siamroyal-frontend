<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%"   stop-color="#f0dca8"/>
      <stop offset="50%"  stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#8a6b3a"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1712"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="72" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="14" y="14" width="484" height="484" rx="60" fill="none"
        stroke="url(#gold)" stroke-width="5" opacity="0.55"/>
  <!-- Corner marks -->
  <g stroke="url(#gold)" stroke-width="5" opacity="0.7">
    <line x1="36" y1="36" x2="72" y2="36"/>
    <line x1="36" y1="36" x2="36" y2="72"/>
    <line x1="476" y1="36" x2="440" y2="36"/>
    <line x1="476" y1="36" x2="476" y2="72"/>
    <line x1="36" y1="476" x2="72" y2="476"/>
    <line x1="36" y1="476" x2="36" y2="440"/>
    <line x1="476" y1="476" x2="440" y2="476"/>
    <line x1="476" y1="476" x2="476" y2="440"/>
  </g>
  <!-- S letter -->
  <text x="256" y="362"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="360" font-weight="bold" font-style="italic"
    text-anchor="middle" dominant-baseline="auto"
    fill="url(#gold)">S</text>
  <!-- Underline decoration -->
  <line x1="148" y1="432" x2="364" y2="432"
        stroke="url(#gold)" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="432" r="4" fill="url(#gold)" opacity="0.5"/>
</svg>
